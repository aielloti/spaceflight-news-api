apiVersion: apps/v1
kind: Deployment
metadata:
  name: spaceflight-news-api
  labels:
    app: spaceflight-news-api
    backstage.io/kubernetes-id: spaceflight-news-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: spaceflight-news-api
  template:
    metadata:
      labels:
        app: spaceflight-news-api
        backstage.io/kubernetes-id: spaceflight-news-api
    spec:
      containers:
        - name: spaceflight-news-api
          image: spaceflight-news-api:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "128Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: spaceflight-news-api
  labels:
    app: spaceflight-news-api
    backstage.io/kubernetes-id: spaceflight-news-api
spec:
  selector:
    app: spaceflight-news-api
  ports:
    - port: 80
      targetPort: 8000
