---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spaceflight-news-api
  labels:
    app: spaceflight-news-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: spaceflight-news-api
  template:
    metadata:
      labels:
        app: spaceflight-news-api
    spec:
      containers:
        - name: spaceflight-news-api
          # Substitua pela imagem publicada no seu registry
          image: spaceflight-news-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "128Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: spaceflight-news-api
  labels:
    app: spaceflight-news-api
spec:
  type: ClusterIP
  selector:
    app: spaceflight-news-api
  ports:
    - port: 80
      targetPort: 8000
      protocol: TCP